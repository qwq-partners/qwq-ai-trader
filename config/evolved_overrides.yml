batch:
  min_score: 60.0
  strategy_limits:            # 전략별 최대 동시 포지션 수
    sepa_trend: 5             # 23M 자본 → 5개 한도 (현금이 실질 제약)
    rsi2_reversal: 3          # 과매도 반전은 3개로 집중
    theme_chasing: 2
    gap_and_go: 2
  default_strategy_limit: 3
  gap_down_skip_pct: -3.5   # -2.0→-3.5: 장 시작 오실레이션 후 반등 종목 포착
  lunchtime_scan:             # 낮 추가 스캔/실행 (12:30 윈도우)
    enabled: true             # 아침 미매수 종목 재확인 + 신규 기회 탐지
    time: "12:30"

risk_config:
  daily_max_trades: 30
  default_stop_loss_pct: 4.0
  base_position_pct: 25.0          # ★ LOCKED — 진화 잠금, 수동 분석 후에만 조정
  max_positions: 8                 # 기존5 + 코어3
  strategy_allocation:
    core_holding: 30.0      # 코어홀딩 중장기 (전체 자본 30%)
    sepa_trend: 42.0        # ★ 최고 성과 (88% 승률, +3.82%) → 우선 (60→42)
    rsi2_reversal: 17.5     # 2순위 (67% 승률, +1.83%) (25→17.5)
    momentum_breakout: 0.0  # 비활성 (35% 승률, -0.88%) → 비활성
    theme_chasing: 7.0      # (10→7)
    gap_and_go: 3.5         # (5→3.5)
exit_manager:
  max_stop_pct: 6.0
  min_stop_pct: 3.5
  first_exit_pct: 5.0               # ★ LOCKED — 1차 익절 목표
  first_exit_ratio: 0.3
  stop_loss_pct: 3.0
  trailing_activate_pct: 5.0       # ★ LOCKED — 익절 후 트레일링 활성화 (1차 익절과 동일)
  trailing_stop_pct: 3.0           # ★ LOCKED — 고점 대비 하락 허용폭
momentum_breakout:
  enabled: false            # ← 강제 비활성화 (03-04 대참사 원인)
  stop_loss_pct: 3.5
  min_volume_ratio: 2.5
  trading_start_time: '10:30'
  min_score: 75.0
  min_breakout_pct: 0.8
theme_chasing:
  enabled: true
  stop_loss_pct: 3.5
  min_volume_ratio: 2.3
  trading_start_time: 09:10
  entry_window_minutes: 20
gap_and_go:
  enabled: true
  stop_loss_pct: 2.5
  min_volume_ratio: 3.0
sepa_trend:
  enabled: true
  weight: 60
  min_score: 60
rsi2_reversal:
  enabled: true
  weight: 40
  min_score: 60   # 65→60: 더 많은 과매도 기회 포착 (장중 탐지 추가로 커버)
_meta:
  exit_manager.stop_loss_pct:
    source: manual_review
    timestamp: '2026-02-23T15:35:00'
    note: 2.5→3.0% ATR min 정합성 수정
  exit_manager.first_exit_pct:
    source: manual_review
    timestamp: '2026-02-23T15:35:00'
    note: 2.5→5.0% R:R 1:1→2:1 복원
  exit_manager.trailing_activate_pct:
    source: manual_review_locked
    timestamp: '2026-03-07T23:40:00'
    note: 2.5→5.0% 1차 익절과 동일 (분할익절 우선, 조기 트레일링 방지)
  exit_manager.trailing_stop_pct:
    source: manual_review_locked
    timestamp: '2026-03-07T23:40:00'
    note: 2.5→3.0% noise 탈출 방지 (주간 5% 목표 손익비 최적화)
  risk_config.base_position_pct:
    source: manual_review_locked
    timestamp: '2026-03-07T23:40:00'
    note: 10→25% 포지션 크기 복원 (수익 레버리지 확보, 진화 잠금)
  risk_config.strategy_allocation:
    source: manual_review
    timestamp: '2026-03-07T11:00:00'
    note: 성과 기반 재조정 - sepa_trend 5→60%, rsi2_reversal 40→25%
  momentum_breakout.enabled:
    source: manual_review
    timestamp: '2026-03-07T11:00:00'
    note: 03-04 대참사 이후 강제 비활성화 (35% 승률, -1.07M 손실)
