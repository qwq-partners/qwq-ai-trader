# QWQ AI Trader - 통합 설정 (KR + US)
# ============================================
# KIS 단일 appkey로 국내+해외 주식 동시 운영

# ── 공유 설정 ──
kis:
  env: prod                        # appkey/appsecret은 .env에서

telegram:
  enabled: true

llm:
  primary: gemini_flash_lite
  fallback: openai_gpt5_mini
  daily_budget: 5.0

logging:
  level: INFO
  file_enabled: true
  file_path: ./logs
  rotation: "1 day"
  retention: "7 days"

dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8080

# ── KR 마켓 ──
kr:
  trading:
    initial_capital: 10000000        # 초기 자본금 (1000만원 → .env INITIAL_CAPITAL 우선)
    market: KRX
    enable_pre_market: true          # 프리장 (08:00~08:50)
    enable_next_market: true         # 넥스트장 (15:40~20:00)
    pre_market_slippage_buffer_pct: 3.0
    fees:
      buy_rate: 0.00014              # 매수 수수료 0.014% (한투 BanKIS 0.0140527%)
      sell_rate: 0.00213             # 매도 수수료 + 거래세 0.213% (수수료 0.013% + 세금 0.20%)
    slippage:
      expected_ticks: 1
      max_ticks: 3

  risk:
    daily_max_loss_pct: 5.0
    daily_max_trades: 10
    max_daily_new_buys: 5
    base_position_pct: 25.0
    max_position_pct: 28.0
    max_positions: 8
    min_cash_reserve_pct: 5.0
    min_position_value: 200000       # 20만원
    dynamic_max_positions: true
    default_stop_loss_pct: 4.0
    default_take_profit_pct: 10.0
    trailing_stop_pct: 2.5
    hot_theme_position_pct: 50.0
    momentum_multiplier: 1.5
    flex_extra_positions: 2
    flex_cash_threshold_pct: 10.0
    max_positions_per_sector: 2
    strategy_allocation:
      core_holding: 30.0
      sepa_trend: 30.0
      rsi2_reversal: 20.0
      momentum_breakout: 0.0
      gap_and_go: 10.0
      theme_chasing: 10.0
      strategic_swing: 0.0  # batch_analyzer가 동적 생성하는 복합신호 — engine.G5_budget 게이트 통과를 위해 키 등록 필요
    hybrid:
      enabled: false
      day_trading_pct: 20.0
      short_term_pct: 30.0
      swing_pct: 50.0

  # 2026-04-23 추가: 크로스검증/LLM/교체 튜닝 파라미터 (진화 시스템 연동 가능)
  validator:
    # CrossStrategyValidator
    min_pass_score: 50                    # 감점 후 이 미만이면 차단
    missing_indicator_penalty_step: 2     # 지표 1개 결손당 감점
    missing_indicator_penalty_cap: 8      # 최대 감점 (4개 결손부터 적용)
    llm_daily_max: 10                     # LLM 이중검증 하루 최대 호출수
    # G4 LLM 트리거 (engine RiskManager)
    llm_check_score_min: 85               # 이 이상에서 LLM 호출 시작
    llm_bypass_score: 95                  # 이 이상에선 LLM 우회 (강한 모멘텀 신뢰)
    llm_reject_size_mult: 0.5             # LLM 거부 시 포지션 사이즈 배율
    # 포지션 만석 자동 교체
    replacement_min_score: 85             # 이 점수 이상 신규 시그널만 교체 트리거
    replacement_cooldown_sec: 600         # 같은 포지션 재축출 쿨다운(초)

  strategies:
    defaults:
      holding_period_days: 3
      stop_loss_pct: 4.0
      take_profit_pct: 10.0
      trailing_stop_pct: 2.5
      min_volume_ratio: 2.0
      min_score: 60.0
      position_size_multiplier: 1.0
      min_rr_ratio: 2.0  # 최소 Risk/Reward 비율 (2:1)

    momentum_breakout:
      enabled: false
      time_horizon: swing
      holding_period_days: 3
      breakout_period: 20
      confirm_candles: 2
      min_breakout_pct: 0.8
      volume_surge_ratio: 2.5
      stop_loss_pct: 4.0
      take_profit_pct: 10.0
      trailing_stop_pct: 3.0

    theme_chasing:
      enabled: false
      time_horizon: short_term
      holding_period_days: 2
      min_theme_score: 70
      entry_window_minutes: 30
      stop_loss_pct: 3.0
      take_profit_pct: 8.0
      trailing_stop_pct: 2.0
      # 진입 품질 강화
      min_trading_value: 500000000    # 최소 거래대금 5억원
      min_theme_breadth: 3            # 테마 내 동반 상승 최소 종목 수
      theme_breadth_change_pct: 1.0   # 동반 상승 판정 최소 등락률 (%)
      max_high_retreat_pct: 3.0       # 장중 고점 대비 최대 후퇴 (%)
      max_atr_pct: 5.5               # ATR 상한 — 고변동 종목 차단 (노이즈 손절 방지) (%)


    gap_and_go:
      enabled: false
      time_horizon: short_term
      holding_period_days: 2
      min_gap_pct: 2.0
      max_gap_pct: 10.0
      entry_delay_minutes: 20
      pullback_pct: 0.8
      min_volume_ratio: 2.5
      stop_loss_pct: 3.0
      take_profit_pct: 8.0
      trailing_stop_pct: 2.0

    rsi2_reversal:
      enabled: true
      rsi_period: 2
      rsi_entry: 10
      rsi_exit: 70
      ma_trend_period: 200
      bb_period: 20
      bb_std: 2.0
      stop_loss_pct: 5.0
      max_holding_days: 10
      min_score: 65
      weight: 60

    sepa_trend:
      enabled: true
      stop_loss_pct: 5.0
      max_holding_days: 10
      min_score: 55
      weight: 40

    core_holding:
      enabled: true
      max_positions: 3
      position_pct: 10.0
      max_position_pct: 15.0
      min_score: 70
      replace_threshold: 15
      min_market_cap_b: 0.5
      min_price: 5000
      min_avg_trading_value: 1000000000
      stop_loss_pct: 15.0
      trailing_stop_pct: 8.0
      trailing_activate_pct: 10.0
      max_holding_days: 0
      stale_exit_days: 0
      stale_high_days: 0
      emergency_stop_pct: 15.0
      rebalance_day: 1
      rebalance_exclude: []         # 리밸런싱 제외 종목 코드 목록
      ma200_break_days: 5
      early_ma200_alert_days: 3          # 조기경보: MA200 이탈 연속 일수
      early_loss_alert_pct: -12.0        # 조기경보: 손실률 임계 (손절 -15% 전)
      early_rescore_alert: 40.0          # 조기경보: 재스코어 하한
      # 초과 비중 관리
      overweight_alert_pct: 35.0         # 경고 알림 기준 (총자산 대비 코어 비중 %)
      trim_threshold_pct: 40.0           # 트림 실행 기준 (%)
      trim_ratio: 0.5                    # 초과분 대비 트림 비율 (50%)
      trim_min_value: 200000             # 최소 트림 금액 (원, 수수료 대비)
      individual_max_pct: 20.0           # 개별 종목 트림 기준 (총자산 대비 %)

  exit_manager:
    enable_partial_exit: true
    first_exit_pct: 5.0
    first_exit_ratio: 0.30
    second_exit_pct: 15.0
    second_exit_ratio: 0.50
    third_exit_pct: 25.0
    third_exit_ratio: 0.5
    stop_loss_pct: 5.0
    enable_dynamic_stop: true
    atr_multiplier: 2.0
    min_stop_pct: 4.0
    max_stop_pct: 7.0
    trailing_stop_pct: 3.0
    trailing_activate_pct: 5.0
    include_fees: true
    stale_exit_days: 5
    stale_exit_pnl_pct: 2.0
    # 익절 후 저효율 청산
    post_exit_stale_days: 5
    post_exit_stale_pnl_pct: 3.0
    # 복합 트레일링 (MA5 + 전일저가 기반)
    enable_composite_trailing: true
    composite_trail_min_stage: "first"
    composite_ma5_buffer_pct: 0.5
    composite_prev_low_enabled: true

  batch:
    morning_scan_enabled: true
    morning_scan_time: "08:20"
    daily_scan_time: "15:40"
    execute_time: "09:30"
    signal_interval_sec: 30             # 시그널 분산 실행 간격 (슬리피지 방지)
    position_update_interval: 10
    # 2026-05-05: 시장 체제별 슬리피지 분기 (bull 5% / neutral·bear 3%)
    # 단일 float도 하위 호환 (모든 체제 동일 적용)
    max_entry_slippage_pct:
      bull: 5.0
      neutral: 3.0
      caution: 3.0
      bear: 3.0
    max_holding_days: 10
    evening_scan_enabled: true
    evening_scan_time: "19:30"
    evening_scan:
      ovtm_vol_threshold: 0.01
      price_bonus_pct: 2.0
      price_penalty_pct: -3.0
    premarket_revalidation:
      rsi2_bounce_cancel_pct: 3.0      # RSI-2: 프리장 반등 ≥3% → 시그널 취소
      gap_down_cancel_pct: -5.0        # 공통: 프리장 급락 ≤-5% → 시그널 취소
      min_rr_ratio: 1.3                # SEPA/코어: R/R < 1.3 → 시그널 취소
      gap_remove_pct: 8.0
      score_bonus: 10.0
      score_penalty: -15.0
      min_score_after: 60.0

  screener:
    scan_interval_minutes: 5
    min_volume_ratio: 2.0
    min_change_pct: 1.0
    max_change_pct: 15.0
    min_trading_value: 100000000
    min_market_cap: 1000

  intraday_buy:
    enabled: true
    min_score: 90          # 장중품질 최소 점수 (ATR 동적 캡으로 품질 보완)
    max_change_pct: 3.0    # ATR 없을 때 fallback 상한 (ATR 있으면 ATR*0.7 사용)
    min_cash_ratio: 0.20
    max_daily_entries: 3
    trading_start_time: "10:00"
    trading_end_time: "14:30"
    llm_verify_enabled: true

  sector_surge:            # 섹터 서지 리더 전략 (Step 2)
    enabled: true
    sector_min_change_pct: 2.0   # 섹터 ETF 오늘 등락 기준 (이상이면 급등 섹터)
    min_score: 60.0              # 섹터 컨텍스트가 품질 보완 → 60점으로 완화
    max_rs_ratio: 1.0            # 섹터 대비 RS 상한 (1.0 = 섹터 등락률 이하만)

  theme_detector:
    scan_interval_minutes: 10
    min_news_count: 3
    min_theme_score: 70.0

  us_market:
    enabled: true
    fetch_time: "07:30"
    cache_ttl_hours: 24

  evolution:
    enabled: true
    analysis_days: 7
    min_trades_for_evolution: 5
    min_confidence_to_apply: 0.6
    auto_rollback_threshold: -2.0
    evaluation_period_days: 7
    send_telegram: false

  # LLM 운영 루프 고도화
  llm_ops:
    regime_classifier_enabled: true     # 08:10 LLM 시장 레짐 분류기
    batch_llm_filter_enabled: true      # 배치 스캔 후 LLM 컨텍스트 필터
    daily_bias_enabled: true            # 20:30 daily_bias.json 피드백 루프
    position_eod_check_enabled: true    # 15:00 포지션 LLM 종가 점검
    false_negative_analysis_enabled: true  # 주간 FN 분석
    regime_conflict_guard_enabled: true # KOSPI 기술 레짐 vs LLM 레짐 충돌 가드

  stock_master:
    enabled: true
    refresh_time: "18:00"
    skip_weekends: true
    auto_initial_refresh: true
    cache_ttl_hours: 24

  scheduler:
    morning_report_time: "08:25"
    evening_report_time: "16:00"
    evolution_time: "20:30"
    candle_refresh_times: ["15:40", "20:40"]
    candle_refresh_max_symbols: 50

  broker:
    type: kis
    timeout_seconds: 15

  data:
    realtime_source: rest_polling
    history:
      lookback_days: 60
      cache_enabled: true

# ── US 마켓 ──
us:
  trading:
    initial_capital: 700             # $700
    market: US
    enable_pre_market: false
    enable_after_hours: false
    commission:
      type: kis
      rate: 0.0                      # zero-commission (KIS 해외주식)
      min: 0.0
    slippage:
      model: percentage
      rate: 0.05

  risk:
    daily_max_loss_pct: 3.0
    max_positions: 10
    base_position_pct: 25.0
    max_position_pct: 35.0
    min_cash_reserve_pct: 10.0
    min_position_value: 50           # $50
    max_positions_per_sector: 3
    stop_loss_pct: 4.0
    take_profit_pct: 6.0
    trailing_stop_pct: 3.0
    consecutive_loss_threshold: 3
    consecutive_loss_size_factor: 0.5

  strategies:
    momentum:
      enabled: true
      time_horizon: swing
      breakout_period: 20
      min_breakout_pct: 2.0
      volume_surge_ratio: 2.5
      min_score: 65
      stop_loss_pct: 5.0
      take_profit_pct: 15.0

    sepa:
      enabled: true
      time_horizon: swing
      min_score: 70
      stop_loss_pct: 5.0
      take_profit_pct: 15.0
      max_holding_days: 20
      min_rs_rating: 70

    earnings_drift:
      # 비활성화: EPS surprise / 매출 성장률 API 미연동 상태 — 갭+거래량 프록시만으로
      # 운용하면 sell-the-news(어닝 부진 발표 후 갭업) 위험 무방비.
      # finnhub/polygon earnings calendar 연동 + EPS surprise ≥10% 가드 추가 후 재활성화.
      enabled: false
      time_horizon: swing
      min_eps_surprise_pct: 10
      min_gap_pct: 7.0
      min_volume_surge: 3.5
      min_revenue_growth_pct: 15
      min_score: 70
      stop_loss_pct: 5.5
      max_holding_days: 20

  exit_manager:
    enable_partial_exit: true
    first_exit_pct: 3.0
    first_exit_ratio: 0.40
    second_exit_pct: 6.0
    second_exit_ratio: 0.50
    third_exit_pct: 10.0
    third_exit_ratio: 0.50
    stop_loss_pct: 4.0
    trailing_stop_pct: 3.0
    trailing_activate_pct: 3.0
    enable_dynamic_stop: true
    atr_multiplier: 2.0
    min_stop_pct: 2.0
    max_stop_pct: 6.0
    eod_close: true
    stale_exit_days: 7
    stale_exit_pnl_pct: 3.0

  universe:
    pools:
      - sp500
      - sp400
    min_price: 5.0
    max_price: 200.0
    min_avg_volume_usd: 5000000
    min_market_cap_mm: 300
    excluded_symbols:
      - IXC   # 해외ETP 거래 미신청 계좌 — 매수불가
      - GUSH  # 해외ETP 거래 미신청 계좌 — 매수불가

  live:
    broker: kis
    env: prod
    screening_interval_min: 15
    max_screen_symbols: 100
    max_signals_per_cycle: 3
    signal_cooldown_sec: 300
    position_sync_sec: 30
    exit_check_sec: 30
    order_check_sec: 10
    heartbeat_sec: 300
    default_exchange: NASD
